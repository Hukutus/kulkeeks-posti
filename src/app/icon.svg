<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rear wheel -->
  <circle cx="8" cy="22" r="6" stroke="#FF6200" stroke-width="2"/>
  <!-- Front wheel -->
  <circle cx="24" cy="22" r="6" stroke="#FF6200" stroke-width="2"/>
  <!-- Frame: bottom bracket to rear axle -->
  <line x1="14" y1="22" x2="8" y2="22" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Frame: bottom bracket to seat tube top -->
  <line x1="14" y1="22" x2="13" y2="13" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Frame: seat tube top to front fork top (top tube) -->
  <line x1="13" y1="13" x2="21" y2="11" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Frame: bottom bracket to front fork top (down tube) -->
  <line x1="14" y1="22" x2="21" y2="11" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Front fork: fork crown to front axle -->
  <line x1="21" y1="11" x2="24" y2="22" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="11" y1="13" x2="15" y2="13" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebars -->
  <line x1="20" y1="9" x2="23" y2="11" stroke="#FF6200" stroke-width="2" stroke-linecap="round"/>
</svg>
